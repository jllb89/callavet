name: cav_mobile
description: Call a Vet mobile app (Flutter)
version: 0.1.0
publish_to: "none"

environment:
  sdk: ">=3.2.0 <4.0.0"
  flutter: ">=3.16.0"

dependencies:
  flutter:
    sdk: flutter
  cupertino_icons: ^1.0.6
  go_router: ^13.2.3
  flutter_riverpod: ^2.5.1
  supabase_flutter: ^2.5.4
  flutter_phoenix: ^1.1.1
  flutter_svg: ^2.0.10+1
  url_launcher: ^6.3.1
  country_picker: ^2.0.25
  flutter_libphonenumber: ^2.2.3
  geolocator: ^13.0.2
  geocoding: ^3.0.0
  image_picker: ^1.1.2
  livekit_client: ^2.7.0
  device_info_plus: ^12.4.0
  record: ^6.2.1
  path_provider: ^2.1.6
  just_audio: ^0.10.6
  video_player: ^2.11.1
  flutter_image_compress: ^2.4.0
  video_compress: ^3.1.4
  sqlite3_flutter_libs: ^0.6.0+eol

flutter:
  uses-material-design: true
  assets:
    - assets/fonts/
    - assets/images/
    - assets/icons/
    - assets/images/onboarding/rectangle_1.png
    - assets/images/onboarding/rectangle_2.png
    - assets/images/onboarding/rectangle_3.png
    - assets/icons/call_a_vet.png

  fonts:
    - family: ABCDiatype
      fonts:
        - asset: assets/fonts/ABC Diatype.ttf
        - asset: assets/fonts/ABC Diatype Light.ttf
        - asset: assets/fonts/ABC Diatype Medium.ttf
        - asset: assets/fonts/ABC Diatype Thin.ttf

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^3.0.1
