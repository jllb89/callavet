name: cav_vet
description: Call a Vet veterinarian app (Flutter)
version: 0.1.0
publish_to: "none"

environment:
  sdk: ">=3.2.0 <4.0.0"
  flutter: ">=3.16.0"

dependencies:
  flutter:
    sdk: flutter
  country_picker: ^2.0.25
  cupertino_icons: ^1.0.6
  flutter_libphonenumber: ^2.2.3
  flutter_riverpod: ^2.5.1
  flutter_svg: ^2.0.10+1
  go_router: ^13.2.3
  supabase_flutter: ^2.5.4
  livekit_client: ^2.7.0

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^3.0.1

flutter:
  uses-material-design: true
  assets:
    - assets/fonts/
    - assets/images/onboarding/rectangle_1.png
    - assets/icons/call_a_vet.png
    - assets/icons/call a vet.svg
    - assets/icons/continue.svg
    - assets/icons/homelogo.svg
    - assets/icons/rightup.svg
    - assets/icons/user.svg

  fonts:
    - family: ABCDiatype
      fonts:
        - asset: assets/fonts/ABC Diatype.ttf
        - asset: assets/fonts/ABC Diatype Light.ttf
        - asset: assets/fonts/ABC Diatype Medium.ttf
        - asset: assets/fonts/ABC Diatype Thin.ttf
    - family: ABC Diatype
      fonts:
        - asset: assets/fonts/ABC Diatype.ttf
        - asset: assets/fonts/ABC Diatype Light.ttf
        - asset: assets/fonts/ABC Diatype Medium.ttf
        - asset: assets/fonts/ABC Diatype Thin.ttf
